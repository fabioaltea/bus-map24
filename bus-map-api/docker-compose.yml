services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: busmapdb
      POSTGRES_USER: busmap
      POSTGRES_PASSWORD: busmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busmap -d busmapdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
